name: CI

on:
  push:
    branches: [main, develop]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: "Install dependencies"
        run: sudo apt-get update && sudo apt-get install -y --fix-missing shellcheck

      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: "shellcheck"
        run: test/shellcheck

  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - alpine
          - archlinux
          - debian
          - fedora
          - opensuse-tumbleweed
          - ubuntu
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: "Run tests"
        run: CONTAINER_RUNTIME=docker test/run -p ${{ matrix.platform }}

  macos:
    runs-on: macos-latest
    steps:
      - name: "Install dependencies"
        run: |
          brew install bash fzf parallel
          brew install --cask keepassxc

      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: "Run tests"
        run: sudo test/run -c no-shellcheck

  archive:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: pw
          path: |
            examples/**
            lib/**
            plugins/**
            src/**
            CHANGELOG.md
            LICENSE.txt
            README.md
            version.txt
